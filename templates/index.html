<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Analyzer</title>
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0d0d0f;
    --surface: #141417;
    --surface-2: #1c1c21;
    --border: rgba(255, 255, 255, 0.07);
    --border-hover: rgba(255, 200, 100, 0.3);
    --text-primary: #f0ece4;
    --text-secondary: #8a8680;
    --text-muted: #4a4845;
    --accent: #e8a428;
    --accent-glow: rgba(232, 164, 40, 0.15);
    --accent-dim: #b8821e;
    --error: #e05c5c;
    --error-bg: rgba(224, 92, 92, 0.08);
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  *, *::before, *::after {
    box-sizing: border-box;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    margin: 0;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(232, 164, 40, 0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 85% 80%, rgba(80, 60, 200, 0.04) 0%, transparent 50%);
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 860px;
    margin: 60px auto;
    padding: 0 24px;
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Header ── */
  h1 {
    margin: 0 0 6px;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text-primary);
    line-height: 1.2;
    margin-bottom:6px;
  }

  h1 span { color: var(--accent); }

  p {
    margin: 0 0 24px;
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.03em;
    line-height: 1.6;
    margin-bottom:20px;
  }

  /* ── File input ── */
  #resumeInput {
    display: block;
    width: 100%;
    margin-bottom: 16px;
    padding: 0;
    font-family: 'DM Mono', monospace;
    font-size: 12.5px;
    font-weight: 300;
    color: var(--text-secondary);
    background: transparent;
    border: 1px dashed rgba(255, 255, 255, 0.1);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: border-color var(--transition), background var(--transition);
    /* make the whole row clickable and nicely padded */
    padding: 12px 16px;
  }

  #resumeInput:hover {
    border-color: rgba(232, 164, 40, 0.3);
    background: rgba(232, 164, 40, 0.03);
  }

  #resumeInput:focus {
    outline: none;
    border-color: rgba(232, 164, 40, 0.45);
  }

  #resumeInput::file-selector-button {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: #0d0d0f;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    margin-right: 14px;
    cursor: pointer;
    transition: background var(--transition);
  }

  #resumeInput::file-selector-button:hover {
    background: #f0b030;
  }

  /* ── Textarea ── */
  textarea {
    display: block;
    width: 100%;
    min-height: 148px;
    margin-bottom: 0; /* button follows immediately below */
    padding: 14px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13.5px;
    font-weight: 300;
    line-height: 1.65;
    color: var(--text-primary);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    resize: vertical;
    transition: border-color var(--transition), box-shadow var(--transition);
    outline: none;
    caret-color: var(--accent);
  }

  textarea::placeholder { color: var(--text-muted); }

  textarea:focus {
    border-color: rgba(232, 164, 40, 0.4);
    box-shadow: inset 0 0 0 1px rgba(232, 164, 40, 0.08),
                0 0 0 3px rgba(232, 164, 40, 0.05);
  }

  /* ── Button ── */
  button {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    padding: 11px 22px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
    transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
    overflow: hidden;
  }

  button:hover:not(:disabled) {
    background: #f0b030;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(232, 164, 40, 0.28);
  }

  button:active:not(:disabled) {
    transform: translateY(0);
    box-shadow: none;
  }

  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  /* ── Meta ── */
  .meta {
    margin-top: 14px;
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    min-height: 18px; /* prevents layout jump when empty */
    display: flex;
    align-items: center;
    gap: 10px;
    transition: opacity var(--transition);
  }

  /* ── Result box ── */
  .result {
    position: relative;
    margin-top: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    white-space: pre-wrap;
    line-height: 1.7;
    min-height: 80px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-secondary);
    transition: border-color var(--transition), color var(--transition);
  }

  .result.has-content {
    border-color: rgba(232, 164, 40, 0.14);
    color: var(--text-primary);
  }

  .result.has-content::before {
    content: '';
    position: absolute;
    top: 0; left: 24px; right: 24px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,164,40,0.25), transparent);
  }

  .result.error {
    color: var(--error);
    background: var(--error-bg);
    border-color: rgba(224, 92, 92, 0.2);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  /* ── Scrollbars ── */
  textarea::-webkit-scrollbar,
  .result::-webkit-scrollbar { width: 4px; }
  textarea::-webkit-scrollbar-track,
  .result::-webkit-scrollbar-track { background: transparent; }
  textarea::-webkit-scrollbar-thumb,
  .result::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  textarea::-webkit-scrollbar-thumb:hover,
  .result::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ── Selection ── */
  ::selection { background: rgba(232, 164, 40, 0.2); color: var(--text-primary); }
</style>
</head>
<body>
  <div class="container">
    <h1>Resume <span>Analyzer</span></h1>
    <p>Upload a resume PDF and enter job description to get AI-based analysis.</p>

    <input id="resumeInput" type="file" accept="application/pdf" />
    <div id="fileName" class="meta"></div>
    <textarea id="jdInput" placeholder="Paste job description here..."></textarea>
    <button id="analyzeBtn">Analyze Resume</button>

    <div class="meta" id="metaText"></div>
    <div class="result" id="resultBox">Response will appear here...</div>
  </div>

  <script>
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resumeInput = document.getElementById('resumeInput');
    const jdInput = document.getElementById('jdInput');
    const resultBox = document.getElementById('resultBox');
    const metaText = document.getElementById('metaText');
    const fileName=document.getElementById('filename');

    resumeInput.addEventListener("change",()=>{
      const file=resumeInput.files[0];
      fileName.textContent=file?`Selected Resume: ${file.name}`:"";
    });

    analyzeBtn.addEventListener('click', async () => {
      
      const resumeFile = resumeInput.files[0];
      const jobDescription = jdInput.value.trim();

      resultBox.classList.remove('error', 'has-content');

      if (!resumeFile) {
        resultBox.textContent = 'Please upload a resume PDF.';
        resultBox.classList.add('error');
        return;
      }

      if (!jobDescription) {
        resultBox.textContent = 'Please enter a job description.';
        resultBox.classList.add('error');
        return;
      }

      analyzeBtn.disabled = true;
      analyzeBtn.textContent = 'Analyzing...';
      resultBox.textContent = 'AI is analyzing the rrsume using semantic search...';
      metaText.textContent = '';

      try {
        const formData = new FormData();
        formData.append('resume', resumeFile);
        formData.append('job_description', jobDescription);

        const response = await fetch('/analyze', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Something went wrong.');
        }

        resultBox.textContent = data.response || 'No response received.';
        resultBox.classList.add('has-content');

        const dbName = data.vector_db || 'N/A';
        const indexed = data.chunks_indexed ?? 'N/A';
        const retrieved = data.chunks_retrieved ?? 'N/A';
        const distance = data.avg_distance ?? 'N/A';

        metaText.textContent = `Analyzed: ${resumeFile.name} | Vector DB: ${dbName} | Indexed Chunks: ${indexed} | Retrieved Chunks: ${retrieved} | Avg Distance: ${distance}`;
      } catch (error) {
        resultBox.classList.add('error');
        resultBox.textContent = `Error: ${error.message}`;
      } finally {
        analyzeBtn.disabled = false;
        analyzeBtn.textContent = 'Analyze Resume';
      }
    });
  </script>
</body>
</html>
